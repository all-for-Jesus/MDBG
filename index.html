<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Daily Bread Global App</title>
  <script>
    var ua = navigator.userAgent || navigator.vendor || window.opera;

    if (/android/i.test(ua)) {
      window.location.href = "https://play.google.com/store/apps/details?id=com.subsplashconsulting.s_7G2TXC";
    } else if (/iPad|iPhone|iPod/.test(ua)) {
      window.location.href = "https://apps.apple.com/us/app/my-daily-bread-global/id1658929360";
    } else {
      // fallback for desktop or unknown devices
      window.location.href = "https://mydailybreadglobal.com";
    }
  </script>
</head>

</body>
</html>
